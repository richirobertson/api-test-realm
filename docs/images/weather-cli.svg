<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" role="img" aria-labelledby="title description">
  <title id="title">Open-Meteo CLI example</title>
  <desc id="description">A terminal-style preview of the weather London command returning a curated forecast profile.</desc>
  <rect width="900" height="440" rx="16" fill="#101827"/>
  <rect width="900" height="48" rx="16" fill="#1f2937"/>
  <rect y="32" width="900" height="16" fill="#1f2937"/>
  <circle cx="30" cy="24" r="7" fill="#ff5f57"/>
  <circle cx="54" cy="24" r="7" fill="#febc2e"/>
  <circle cx="78" cy="24" r="7" fill="#28c840"/>
  <text x="112" y="30" fill="#d1d5db" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Open-Meteo terminal explorer</text>
  <rect x="612" y="92" width="238" height="280" rx="12" fill="#172235" stroke="#334155"/>
  <g transform="translate(632 112) scale(1.65)">
    <rect width="120" height="80" fill="#12304a"/>
    <circle cx="43" cy="29" r="14" fill="#ffd166"/>
    <path d="M28 57h64c7 0 12-5 12-11s-5-11-12-11c-3-11-14-18-25-15-5-8-17-10-25-4-5 4-7 9-7 14-11-1-19 6-19 15 0 7 5 12 12 12z" fill="#d9e5ef"/>
  </g>
  <text x="636" y="346" fill="#d1d5db" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Local cloudy-weather symbol</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">
    <text x="32" y="86" fill="#93c5fd">$</text>
    <text x="54" y="86" fill="#f9fafb">weather London</text>
    <text x="32" y="124" fill="#9ca3af">{</text>
    <text x="52" y="156" fill="#9ca3af">&quot;location&quot;: {</text>
    <text x="76" y="188" fill="#9ca3af">&quot;name&quot;: </text><text x="176" y="188" fill="#fb923c">&quot;London&quot;</text><text x="264" y="188" fill="#9ca3af">,</text>
    <text x="76" y="220" fill="#9ca3af">&quot;country&quot;: </text><text x="210" y="220" fill="#c4b5fd">&quot;United Kingdom&quot;</text><text x="376" y="220" fill="#9ca3af">,</text>
    <text x="76" y="252" fill="#9ca3af">&quot;timezone&quot;: </text><text x="220" y="252" fill="#c4b5fd">&quot;Europe/London&quot;</text>
    <text x="52" y="284" fill="#9ca3af">},</text>
    <text x="52" y="316" fill="#9ca3af">&quot;current&quot;: {</text>
    <text x="76" y="348" fill="#9ca3af">&quot;conditions&quot;: </text><text x="244" y="348" fill="#86efac">&quot;Overcast&quot;</text><text x="354" y="348" fill="#9ca3af">,</text>
    <text x="76" y="380" fill="#9ca3af">&quot;temperature&quot;: </text><text x="266" y="380" fill="#a7f3d0">19.5</text>
    <text x="52" y="412" fill="#9ca3af">}, &quot;dailyForecast&quot;: [</text><text x="330" y="412" fill="#c4b5fd">...</text><text x="363" y="412" fill="#9ca3af">]</text>
  </g>
</svg>
