name: PR checks — PokéAPI deterministic tests and coverage

on:
  pull_request:

permissions:
  contents: read

jobs:
  mocked-tests:
    name: PokéAPI — deterministic tests and coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poke-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: poke-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic mocked tests and write evidence
        run: npm run test:mocked:report

      - name: Upload mocked test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mocked-test-report
          path: poke-api/reports/mocked-test-results.json
          if-no-files-found: warn

      - name: Upload mocked test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mocked-test-coverage
          path: poke-api/coverage
          if-no-files-found: warn
